<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ عمرو علي عبد الرحمن محمد</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            direction: rtl;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 25px 10px;
        }
        header h1 {
            font-size: 1.4rem;
            line-height: 1.5;
        }
        nav {
            background: white;
            padding: 15px;
            border-bottom: 2px solid #ddd;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            text-decoration: none;
            color: #2c3e50;
            margin: 5px 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .main-box {
            background: white;
            max-width: 90%;
            width: 600px; 
            margin: 30px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .profile-img {
            width: 250px; /* الصورة الكبيرة اللي طلبتها */
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #2c3e50;
            margin-bottom: 20px;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; font-size: 1.6rem; }
        p { font-size: 1.2rem; line-height: 1.7; margin: 10px 0; }
        .highlight { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>مرحباً بكم في منصة الأستاذ عمرو علي عبد الرحمن محمد</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="science.html">دروس العلوم</a>
        <a href="tech.html">دروس التكنولوجيا</a> 
    </nav>

    <div class="main-box">
        <img src="amr.jpg" alt="الأستاذ عمرو علي" class="profile-img">
        
        <div class="info">
            <h2>عن المنصة</h2>
            <p>أنا الأستاذ/ <span class="highlight">عمرو علي عبد الرحمن محمد</span></p>
            <p>دارس بكلية التربية - قسم تكنولوجيا التعليم الرقمي بجامعة عين شمس.</p>
            <p>يسعدني تصفحكم للمحتوى التعليمي من خلال الروابط الموجودة بالأعلى.</p>
        </div>
    </div>

</body>
</html>

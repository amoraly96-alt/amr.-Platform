<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ عمرو</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6; /* لون خلفية هادي وبسيط */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #2c3e50; /* لون كحلي غامق واحترافي */
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ddd;
        }
        nav a {
            text-decoration: none;
            color: #2c3e50;
            margin: 0 15px;
            font-weight: bold;
        }
        /* كود لعمل حاوية لعناصر الصفحة الرئيسية */
        .home-layout {
            display: flex; /* استخدمنا flexbox لترتيب العناصر جنباً إلى جنب */
            align-items: center; /* لمحاذاة العناصر عمودياً في المنتصف */
            margin: 40px auto;
            max-width: 1000px;
            padding: 0 20px;
        }
        
        .content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            /* التعديل هنا: خلي الرقم الأول 10px بدل 40px عشان يطلع لفوق */
            margin: 10px auto; 
        }
        
        /* كود لتظبيط الصورة وجعلها على اليسار وفوق */
        .amr-photo-box {
            margin-right: 50px; /* لإعطاء مسافة بين الصورة والكلام */
            max-width: 250px; /* لتقليل حجم الصورة قليلاً */
        }
        
        .amr-photo-box img {
            width: 100%; /* لتأخذ الصورة عرض الحاوية الخاصة بها */
            height: auto; /* للحفاظ على أبعاد الصورة */
            border-radius: 50%; /* لجعل الصورة دائرية (شيك جداً) */
            border: 5px solid white; /* إطار أبيض حول الصورة */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
  رحباً بكم في منصهmالأستا</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="science.html">دروس العلوم</a>
        <a href="tech.html">دروس الحاسب الآلي</a>
    </nav>

    <div class="home-layout">
        <div class="content">
            <h2>عن المنصة</h2>
            <p>أنا عمرو علي، دارس بكلية التربية - قسم تكنولوجيا التعليم الرقمي بجامعة عين شمس.</p>
            <p>يسعدني تصفحكم للمحتوى التعليمي من خلال الروابط بالأعلى.</p>
        </div>
        
        <div class="amr-photo-box">
            <img src="amr.jpg" alt="الأستاذ عمرو علي">
        </div>
    </div>

</body>
</html>

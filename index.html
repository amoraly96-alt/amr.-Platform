<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ عمرو علي عبد الرحمن محمد</title>
    <style>
        /* إعدادات عامة لضمان ظهور كل الكلام */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }
        /* الهيدر مرن عشان الاسم الرباعي */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 10px;
            width: 100%;
        }
        header h1 {
            font-size: 1.4rem;
            max-width: 900px;
            margin: 0 auto;
            word-wrap: break-word;
        }
        /* شريط التنقل */
        nav {
            background-color: #fff;
            padding: 10px;
            border-bottom: 2px solid #ddd;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            text-decoration: none;
            color: #2c3e50;
            margin: 5px 15px;
            font-weight: bold;
            font-size: 1rem;
        }
        /* الحاوية الرئيسية */
        .main-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 15px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* تنسيق الصورة */
        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #2c3e50;
            margin-bottom: 20px;
        }
        /* تنسيق النصوص */
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 5px;
        }
        .intro-p {
            font-size: 1.2rem;
            margin: 10px 0;
            font-weight: 500;
        }
        .highlight {
            color: #2980b9;
            font-weight: bold;
        }
        /* تعديلات الموبايل والشاشات الصغيرة */
        @media (max-width: 600px) {
            header h1 { font-size: 1.1rem; }
            .profile-img { width: 150px; height: 150px; }
            .intro-p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>مرحباً بكم في منصة الأستاذ عمرو علي عبد الرحمن محمد</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="science.html">دروس العلوم</a>
        <a href="tech.html">دروس الحاسب الآلي</a>
    </nav>

    <div class="main-container">
        <div class="card">
            <img src="amr.jpg" alt="الأستاذ عمرو علي عبد الرحمن محمد" class="profile-img">
            
            <div class="info">
                <h2>عن المنصة</h2>
                <p class="intro-p">أنا الأستاذ/ <span class="highlight">عمرو علي عبد الرحمن محمد</span></p>
                <p class="intro-p">دارس بكلية التربية - قسم تكنولوجيا التعليم الرقمي بجامعة عين شمس.</p>
                <p class="intro-p">يسعدني تصفحكم للمحتوى التعليمي من خلال الروابط الموجودة بالأعلى.</p>
            </div>
        </div>
    </div>

</body>
</html>
